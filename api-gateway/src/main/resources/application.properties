server.port=38021

spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[1].id=patient-service
spring.cloud.gateway.routes[1].uri=lb://patient-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/patient/**, /api/problem/**

spring.cloud.gateway.routes[2].id=staff-service
spring.cloud.gateway.routes[2].uri=lb://staff-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/staff/**

spring.cloud.gateway.routes[3].id=receipt-service
spring.cloud.gateway.routes[3].uri=lb://receipt-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/receipt/**

eureka.client.service-url.defaultZone=http://localhost:3802/eureka/
